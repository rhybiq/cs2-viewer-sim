name: Build desktop app

permissions:
  contents: write
  attestations: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "viewer_sim.py"
      - "run_app.py"
      - "requirements.txt"
      - "requirements-ocr.txt"
      - "packaging/**"
      - ".github/workflows/build-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "viewer_sim.py"
      - "run_app.py"
      - "requirements.txt"
      - "requirements-ocr.txt"
      - "packaging/**"
      - ".github/workflows/build-app.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          # Computed here (before the build) so it can be embedded into the exe via
          # app/_version.py, and reused after the build to tag/release with the same value.
          git fetch --tags --force
          $tags = git tag --list "v*.*.*" |
            Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
            Sort-Object { [version]($_ -replace '^v', '') }
          $latest = $tags | Select-Object -Last 1
          if (-not $latest) { $latest = "v0.0.0" }
          $parts = ($latest -replace '^v', '').Split('.')
          $major = [int]$parts[0]; $minor = [int]$parts[1]; $patch = [int]$parts[2]

          # Default is a patch bump. Add "[major]" or "[minor]" to the PR/
          # merge commit title to opt into that bump instead -- e.g. a UI
          # rewrite big enough to warrant a major version, not just another
          # patch. Only inspects the triggering commit, so this doesn't
          # apply to workflow_dispatch runs (no single commit to check),
          # which always patch-bump.
          $commitMsg = git log -1 --pretty=%B
          if ($commitMsg -match '\[major\]') {
            $newTag = "v$($major + 1).0.0"
          } elseif ($commitMsg -match '\[minor\]') {
            $newTag = "v$major.$($minor + 1).0"
          } else {
            $newTag = "v$major.$minor.$($patch + 1)"
          }
          Set-Content -Path app/_version.py -Value "VERSION = `"$newTag`"" -Encoding utf8
          echo "tag=$newTag" >> $env:GITHUB_OUTPUT

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          # CPU-only torch (EasyOCR dep) -- the default PyPI wheel bundles CUDA and is much larger
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-ocr.txt

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Locate ffmpeg.exe
        id: ffmpeg
        run: |
          # `Get-Command ffmpeg` resolves to Chocolatey's PATH shim, not the real
          # binary. The shim finds its target via a relative lookup next to itself,
          # which breaks once PyInstaller bundles the shim alone into the frozen
          # app's temp extraction dir. Bundle the real exe from choco's lib folder.
          $ff = Get-ChildItem "C:\ProgramData\chocolatey\lib\ffmpeg*" -Recurse -Filter ffmpeg.exe |
            Select-Object -First 1 -ExpandProperty FullName
          echo "path=$ff" >> $env:GITHUB_OUTPUT

      - name: Build exe with PyInstaller
        env:
          FFMPEG_EXE_PATH: ${{ steps.ffmpeg.outputs.path }}
        run: pyinstaller packaging/app.spec --noconfirm --distpath dist --workpath build

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          $ver = "${{ steps.version.outputs.tag }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" packaging\installer.iss

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2ViewerSim-exe
          path: dist/CS2ViewerSim.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2ViewerSim-installer
          path: dist/installer/*.exe

      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/CS2ViewerSim.exe
            dist/installer/*.exe

      - name: Push release tag
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/CS2ViewerSim.exe
            dist/installer/*.exe
