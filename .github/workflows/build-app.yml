name: Build desktop app

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "viewer_sim.py"
      - "run_app.py"
      - "requirements.txt"
      - "requirements-ocr.txt"
      - "packaging/**"
      - ".github/workflows/build-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "viewer_sim.py"
      - "run_app.py"
      - "requirements.txt"
      - "requirements-ocr.txt"
      - "packaging/**"
      - ".github/workflows/build-app.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          # CPU-only torch (EasyOCR dep) -- the default PyPI wheel bundles CUDA and is much larger
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-ocr.txt

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Locate ffmpeg.exe
        id: ffmpeg
        run: |
          $ff = (Get-Command ffmpeg).Source
          echo "path=$ff" >> $env:GITHUB_OUTPUT

      - name: Build exe with PyInstaller
        env:
          FFMPEG_EXE_PATH: ${{ steps.ffmpeg.outputs.path }}
        run: pyinstaller packaging/app.spec --noconfirm --distpath dist --workpath build

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2ViewerSim-exe
          path: dist/CS2ViewerSim.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2ViewerSim-installer
          path: dist/installer/*.exe

      - name: Determine release tag
        if: github.event_name == 'push'
        id: tag
        shell: pwsh
        run: |
          # Every push to main (direct push or PR merge) auto-bumps the patch version --
          # no manual tagging step needed.
          git fetch --tags --force
          $tags = git tag --list "v*.*.*" |
            Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
            Sort-Object { [version]($_ -replace '^v', '') }
          $latest = $tags | Select-Object -Last 1
          if (-not $latest) { $latest = "v0.0.0" }
          $parts = ($latest -replace '^v', '').Split('.')
          $newTag = "v$($parts[0]).$($parts[1]).$([int]$parts[2] + 1)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $newTag
          git push origin $newTag
          echo "tag=$newTag" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            dist/CS2ViewerSim.exe
            dist/installer/*.exe
