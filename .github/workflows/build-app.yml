name: Build desktop app

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "app/**"
      - "viewer_sim.py"
      - "run_app.py"
      - "requirements.txt"
      - "packaging/**"
      - ".github/workflows/build-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "viewer_sim.py"
      - "run_app.py"
      - "requirements.txt"
      - "packaging/**"
      - ".github/workflows/build-app.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Locate ffmpeg.exe
        id: ffmpeg
        run: |
          $ff = (Get-Command ffmpeg).Source
          echo "path=$ff" >> $env:GITHUB_OUTPUT

      - name: Build exe with PyInstaller
        env:
          FFMPEG_EXE_PATH: ${{ steps.ffmpeg.outputs.path }}
        run: pyinstaller packaging/app.spec --noconfirm --distpath dist --workpath build

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2ViewerSim-exe
          path: dist/CS2ViewerSim.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CS2ViewerSim-installer
          path: dist/installer/*.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CS2ViewerSim.exe
            dist/installer/*.exe
